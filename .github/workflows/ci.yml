name: CI

# Runs the same verification gates as the local git hooks, so a regression that
# slips past (or bypasses) the hooks is still caught before merge.
on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend (typecheck · lint · test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm test

  rust:
    name: Rust (cargo test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - name: Stage ffmpeg sidecars + notice for the build script
        # externalBin (ffmpeg/ffprobe) + the THIRD_PARTY_NOTICES resource are
        # gitignored and fetched per release platform. `cargo test --lib` never runs
        # them, but tauri-build checks they exist for the build target — so stage
        # empty stubs (and the real, committed notice) to satisfy that check.
        run: |
          T=$(rustc -vV | sed -n 's/^host: //p')
          mkdir -p src-tauri/binaries
          for b in ffmpeg ffprobe; do
            printf '#!/bin/sh\n' > "src-tauri/binaries/$b-$T"
            chmod +x "src-tauri/binaries/$b-$T"
          done
          cp scripts/THIRD_PARTY_NOTICES.ffmpeg.txt src-tauri/binaries/THIRD_PARTY_NOTICES
      - run: cargo test --lib --manifest-path src-tauri/Cargo.toml
